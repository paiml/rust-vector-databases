name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Matrix entries do the actual work. The `gate` aggregator below is
  # the status check the org's main-branch ruleset keys off of — it
  # requires a check named literally `gate`, which matrix expansion
  # doesn't emit. Hence the trailing aggregator job.
  gate-matrix:
    name: gate-matrix (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: ["1.95.0", "stable"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: gate-${{ matrix.toolchain }}

      # Prebuilt binaries from each tool's GitHub release — avoids
      # 5+ minutes of cargo install on every CI run. Stable matrix
      # entry only; the MSRV entry still proves the workspace builds.
      - name: Install prebuilt CLIs (bashrs + pv + pmat)
        if: matrix.toolchain == 'stable'
        env:
          BASHRS_VERSION: v6.66.1
          PV_VERSION: v0.31.2
          PMAT_VERSION: v3.16.0
        run: |
          set -euo pipefail
          install_dir="$RUNNER_TEMP/prebuilt-bin"
          mkdir -p "$install_dir"
          for tool_spec in \
            "bashrs:paiml/bashrs:${BASHRS_VERSION}:bashrs-${BASHRS_VERSION}-x86_64-unknown-linux-gnu" \
            "pv:paiml/aprender:${PV_VERSION}:pv-${PV_VERSION}-x86_64-unknown-linux-gnu" \
            "pmat:paiml/paiml-mcp-agent-toolkit:${PMAT_VERSION}:pmat-${PMAT_VERSION}-x86_64-unknown-linux-gnu"
          do
            IFS=: read -r bin repo ver archive <<< "$tool_spec"
            url="https://github.com/${repo}/releases/download/${ver}/${archive}.tar.gz"
            echo "Downloading $bin from $url"
            curl -sSfL "$url" | tar xz -C "$install_dir"
            mv "$install_dir/$archive/$bin" "$install_dir/$bin"
            chmod +x "$install_dir/$bin"
            "$install_dir/$bin" --version
          done
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Lint compose.yml (docker compose config)
        if: matrix.toolchain == 'stable'
        run: docker compose config --quiet

      - name: Lint Makefile (bashrs)
        if: matrix.toolchain == 'stable'
        run: bashrs lint Makefile

      - name: Lint contracts (pv)
        if: matrix.toolchain == 'stable'
        run: pv lint contracts/

      - name: pmat comply
        if: matrix.toolchain == 'stable'
        run: pmat comply

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace --all-targets

      # The aprender example is fully in-process (no Docker, no model
      # download). Run it from every matrix entry to prove the closing
      # demo lands its provable contracts on every supported toolchain.
      - name: Run aprender_film_search example (no Docker)
        run: cargo run -p vec-cli --example aprender_film_search

      - name: Release build
        run: cargo build --release --workspace

  # Integration smoke: brings the actual compose stack up, runs the
  # qdrant_film_search example end-to-end, asserts all four runtime
  # contracts. Stable-only — same shape the user runs locally via
  # `make up && cargo run -p vec-cli --example qdrant_film_search`.
  integration:
    name: integration (compose + qdrant + example)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: integration

      - name: Bring up Qdrant via docker compose
        run: make up

      - name: Wait for Qdrant healthcheck
        run: make wait

      - name: Run qdrant_film_search example
        run: cargo run -p vec-cli --example qdrant_film_search

      - name: Tear down
        if: always()
        run: docker compose down -v

  # Aggregator. The branch ruleset on `main` requires a status check
  # named exactly `gate`; the matrix above only emits `gate-matrix
  # (toolchain)` rows. This job collapses the matrix + integration into
  # a single check so auto-merge can find it.
  gate:
    name: gate
    needs: [gate-matrix, integration]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.gate-matrix.result }}" != "success" ]; then
            echo "::error::gate-matrix failed (result=${{ needs.gate-matrix.result }})"
            exit 1
          fi
          if [ "${{ needs.integration.result }}" != "success" ]; then
            echo "::error::integration failed (result=${{ needs.integration.result }})"
            exit 1
          fi
          echo "✓ all gates passed"
