<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" width="1280" height="480">
<!-- HERO — paiml/rag-from-zero README banner.
     Visual story: Module 1 aprender-rag pipeline (in-process, pure Rust)
     -> Module 2 pmat query (production code-search RAG with enrichment).
     Same oxide-premium chassis as the c12 lesson masters and the
     mysql-from-zero hero. -->

<defs>
  <style>
    .h { font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; }
    .m { font-family: 'Cascadia Code', 'Fira Code', monospace; }
    .label { font-family: 'Segoe UI', sans-serif; letter-spacing: 0.12em; }
  </style>

  <radialGradient id="bg" cx="50%" cy="40%" r="80%">
    <stop offset="0%" stop-color="#1a2540"/>
    <stop offset="100%" stop-color="#0e1726"/>
  </radialGradient>
  <linearGradient id="accent-strip" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"  stop-color="#00b8d9" stop-opacity="0.85"/>
    <stop offset="50%" stop-color="#9c84ff" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#ffab00" stop-opacity="0.85"/>
  </linearGradient>
  <radialGradient id="zone-aprender" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#00b8d9" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#00b8d9" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="zone-pmat" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="#ffab00" stop-opacity="0.20"/>
    <stop offset="100%" stop-color="#ffab00" stop-opacity="0"/>
  </radialGradient>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
    <path d="M 0 0 L 12 7 L 0 14 Z" fill="#9c84ff"/>
  </marker>
</defs>

<rect width="1280" height="480" fill="url(#bg)"/>

<!-- Top accent strip -->
<rect x="0" y="0" width="1280" height="6" fill="url(#accent-strip)"/>

<!-- Title block — left third -->
<g class="h">
  <text x="60" y="92" font-size="44" font-weight="700" fill="#eeeeee">RAG from Zero</text>
  <text x="60" y="128" font-size="20" fill="#a5d6ff" letter-spacing="0.05em">Rust for Data Engineering · aprender-rag in-process · pmat query in production</text>
  <text x="60" y="158" font-size="14" fill="#7ee787" letter-spacing="0.10em" font-weight="700">2 MODULES · 10 LESSONS · 8 RUNTIME CONTRACTS</text>
</g>

<!-- ======================================================== -->
<!-- LEFT ZONE: Module 1 — aprender-rag pipeline               -->
<!-- ======================================================== -->
<circle cx="290" cy="320" r="180" fill="url(#zone-aprender)"/>
<g id="aprender-pipeline">
  <text x="290" y="218" text-anchor="middle" class="label" font-size="13" font-weight="700" fill="#00b8d9">MODULE 1 · IN-PROCESS</text>

  <rect x="120" y="240" width="340" height="160" rx="10" fill="#0e1726" stroke="#00b8d9" stroke-width="3"/>
  <rect x="120" y="240" width="340" height="32" rx="10" fill="#1a1d23" stroke="#00b8d9" stroke-width="2.5"/>
  <text x="138" y="262" class="m" font-size="14" font-weight="700" fill="#00b8d9">aprender-rag</text>
  <text x="448" y="262" text-anchor="end" class="m" font-size="12" fill="#a5d6ff">no Docker</text>

  <rect x="138" y="290" width="58" height="32" rx="4" fill="#1a2540" stroke="#00b8d9" stroke-width="2"/>
  <text x="167" y="311" text-anchor="middle" class="m" font-size="11" fill="#a5d6ff">chunk</text>

  <rect x="200" y="290" width="58" height="32" rx="4" fill="#1a2540" stroke="#00b8d9" stroke-width="2"/>
  <text x="229" y="311" text-anchor="middle" class="m" font-size="11" fill="#a5d6ff">embed</text>

  <rect x="262" y="290" width="58" height="32" rx="4" fill="#1a2540" stroke="#00b8d9" stroke-width="2"/>
  <text x="291" y="311" text-anchor="middle" class="m" font-size="11" fill="#a5d6ff">index</text>

  <rect x="324" y="290" width="58" height="32" rx="4" fill="#1a2540" stroke="#00b8d9" stroke-width="2"/>
  <text x="353" y="311" text-anchor="middle" class="m" font-size="11" fill="#a5d6ff">fuse</text>

  <rect x="386" y="290" width="58" height="32" rx="4" fill="#1a2540" stroke="#00b8d9" stroke-width="2"/>
  <text x="415" y="311" text-anchor="middle" class="m" font-size="11" fill="#a5d6ff">retrieve</text>

  <text x="138" y="345" class="m" font-size="11" fill="#7ee787">RecursiveChunker(512, 50)</text>
  <text x="138" y="362" class="m" font-size="11" fill="#7ee787">MockEmbedder(384) → candle</text>
  <text x="138" y="379" class="m" font-size="11" fill="#7ee787">RRF { k: 60 }</text>

  <text x="290" y="425" text-anchor="middle" class="label" font-size="12" font-weight="700" fill="#00b8d9">FILM SEARCH · 4 CONTRACTS</text>
</g>

<!-- Center connector arrow: "same RAG, two paradigms" -->
<g id="connector">
  <line x1="490" y1="320" x2="610" y2="320" stroke="#9c84ff" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="550" y="306" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#b8acff">SAME RAG</text>
  <text x="550" y="338" text-anchor="middle" class="label" font-size="11" fill="#9c84ff">text · code</text>
</g>

<!-- ======================================================== -->
<!-- RIGHT ZONE: Module 2 — pmat query                         -->
<!-- ======================================================== -->
<circle cx="930" cy="320" r="180" fill="url(#zone-pmat)"/>
<g id="pmat-query">
  <text x="930" y="218" text-anchor="middle" class="label" font-size="13" font-weight="700" fill="#ffab00">MODULE 2 · IN PRODUCTION</text>

  <rect x="640" y="240" width="580" height="160" rx="10" fill="#0e1726" stroke="#ffab00" stroke-width="3"/>
  <rect x="640" y="240" width="580" height="32" rx="10" fill="#1a1d23" stroke="#ffab00" stroke-width="2.5"/>
  <circle cx="660" cy="256" r="5" fill="#ff5630"/>
  <circle cx="677" cy="256" r="5" fill="#ffab00"/>
  <circle cx="694" cy="256" r="5" fill="#36b37e"/>
  <text x="1206" y="262" text-anchor="end" class="m" font-size="14" font-weight="700" fill="#ffab00">pmat query</text>

  <text x="660" y="296" class="m" font-size="13" fill="#7ee787">$</text>
  <text x="676" y="296" class="m" font-size="13" fill="#a5d6ff">pmat query "dispatch" --rank-by pagerank --churn --faults -G</text>

  <text x="660" y="320" class="m" font-size="11" fill="#b8acff">aprender/src/dispatch.rs:42-89</text>
  <text x="900" y="320" class="m" font-size="11" fill="#7ee787">TDG: A</text>
  <text x="970" y="320" class="m" font-size="11" fill="#ffab00">churn 12%</text>
  <text x="1050" y="320" class="m" font-size="11" fill="#ff9d1a">faults 1</text>
  <text x="1120" y="320" class="m" font-size="11" fill="#9c84ff">PR ↑0.84</text>

  <text x="660" y="338" class="m" font-size="11" fill="#b8acff">trueno/src/vector/dispatch.rs:120-157</text>
  <text x="900" y="338" class="m" font-size="11" fill="#7ee787">TDG: A</text>
  <text x="970" y="338" class="m" font-size="11" fill="#ffab00">churn  4%</text>
  <text x="1050" y="338" class="m" font-size="11" fill="#7ee787">faults 0</text>
  <text x="1120" y="338" class="m" font-size="11" fill="#9c84ff">PR ↑0.71</text>

  <text x="660" y="356" class="m" font-size="11" fill="#b8acff">aprender-rag/src/pipeline.rs:31-78</text>
  <text x="900" y="356" class="m" font-size="11" fill="#7ee787">TDG: A</text>
  <text x="970" y="356" class="m" font-size="11" fill="#ffab00">churn 18%</text>
  <text x="1050" y="356" class="m" font-size="11" fill="#7ee787">faults 0</text>
  <text x="1120" y="356" class="m" font-size="11" fill="#9c84ff">PR ↑0.62</text>

  <text x="660" y="386" class="m" font-size="11" fill="#a5d6ff">flags:</text>
  <text x="700" y="386" class="m" font-size="11" fill="#7ee787">--churn</text>
  <text x="754" y="386" class="m" font-size="11" fill="#ffab00">--duplicates</text>
  <text x="838" y="386" class="m" font-size="11" fill="#9c84ff">--entropy</text>
  <text x="912" y="386" class="m" font-size="11" fill="#ff9d1a">--faults</text>
  <text x="976" y="386" class="m" font-size="11" fill="#36b37e">--coverage-gaps</text>
  <text x="1090" y="386" class="m" font-size="11" fill="#b8acff">-G</text>

  <text x="930" y="425" text-anchor="middle" class="label" font-size="12" font-weight="700" fill="#ffab00">CODE SEARCH · ENRICHED RANKING</text>
</g>

<!-- Bottom contracts strip — single line -->
<g id="contracts-strip">
  <rect x="60" y="448" width="1160" height="22" rx="4" fill="#161b22" stroke="#7ee787" stroke-width="1.5" fill-opacity="0.85"/>
  <text x="80" y="464" class="h" font-size="12" font-weight="700" fill="#7ee787">Provable contracts:</text>
  <text x="208" y="464" class="m" font-size="12" fill="#eeeeee">M1 hits.len() == 5  ·  top.score ≥ 0  ·  film.id &gt; 0  ·  pairwise sort  +  M2 cross-project workspace index</text>
</g>

<!-- GRID PROTOCOL MANIFEST
  template: HERO (README banner)
  canvas: 1280x480
  zones: aprender@(290,320) | connector@(550,320) | pmat@(930,320)
  text_elements: 35
  palette_colors: [#0e1726, #1a2540, #1a1d23, #161b22, #00b8d9, #a5d6ff, #ffab00, #ff9d1a, #ff5630, #9c84ff, #b8acff, #36b37e, #7ee787, #eeeeee]
  bounds_check: all elements within 0,0 → 1280,480
-->
</svg>
